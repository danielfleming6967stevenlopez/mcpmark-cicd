name: Issue Automation
on:
  issues:
    types: [opened, labeled]
jobs:
  setup-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'bug', color: 'd73a4a', description: 'Something isn\'t working' },
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'epic', color: '0052cc', description: 'Large feature requiring multiple sub-tasks' },
              { name: 'maintenance', color: 'fef2c0', description: 'Maintenance and housekeeping tasks' },
              { name: 'priority-critical', color: 'b60205', description: 'Critical priority issue' },
              { name: 'priority-high', color: 'ff9f1a', description: 'High priority issue' },
              { name: 'priority-medium', color: 'ffd400', description: 'Medium priority issue' },
              { name: 'priority-low', color: 'ffff00', description: 'Low priority issue' },
              { name: 'needs-triage', color: 'fbca04', description: 'Needs to be reviewed by maintainers' },
              { name: 'needs-review', color: '1d76db', description: 'Awaiting review from maintainers' },
              { name: 'first-time-contributor', color: '28a745', description: 'Issue created by first-time contributor' }
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
                console.log(`Label ${label.name} already exists.`);
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                  console.log(`Created label ${label.name}.`);
                } else {
                  throw error;
                }
              }
            }
  issue-triage:
    needs: setup-labels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = issue.body ? issue.body.toLowerCase() : '';
            const labels = issue.labels.map(l => l.name);

            if (!labels.includes('needs-triage')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['needs-triage']
              });
            }

            const categoryLabels = [];
            if (title.includes('bug')) categoryLabels.push('bug');
            if (title.includes('epic')) categoryLabels.push('epic');
            if (title.includes('maintenance')) categoryLabels.push('maintenance');

            for (const label of categoryLabels) {
              if (!labels.includes(label)) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [label]
                });
              }
            }

            const priorityKeywords = {
              'priority-critical': ['critical', 'urgent', 'production', 'outage'],
              'priority-high': ['important', 'high', 'blocking'],
              'priority-medium': ['medium', 'normal'],
              'priority-low': ['low', 'nice-to-have', 'minor']
            };

            let priorityLabel = 'priority-medium';
            for (const [label, keywords] of Object.entries(priorityKeywords)) {
              if (keywords.some(keyword => title.includes(keyword) || body.includes(keyword))) {
                priorityLabel = label;
                break;
              }
            }

            if (!labels.includes(priorityLabel)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [priorityLabel]
              });
            }
  task-breakdown:
    needs: issue-triage
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const parentTitle = issue.title;
            const tasks = [
              { name: 'Requirements Analysis', number: 1 },
              { name: 'Design and Architecture', number: 2 },
              { name: 'Implementation', number: 3 },
              { name: 'Testing and Documentation', number: 4 }
            ];

            const subIssues = [];
            for (const task of tasks) {
              const title = `[SUBTASK] ${parentTitle} - Task ${task.number}: ${task.name}`;
              const body = `Related to #${parentNumber}`;
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['enhancement', 'needs-review']
              });
              subIssues.push(subIssue.data);
            }

            const checklist = subIssues.map(sub => `- [ ] #${sub.number} - ${sub.title}`).join('\n');
            const newBody = issue.body ? `${issue.body}\n\n## Epic Tasks\n${checklist}` : `## Epic Tasks\n${checklist}`;
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: newBody
            });
  auto-response:
    needs: task-breakdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const labels = issue.labels.map(l => l.name);

            const userIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              creator: author,
              state: 'all'
            });
            const isFirstIssueInRepo = userIssues.data.length === 1;

            if (isFirstIssueInRepo) {
              if (!labels.includes('first-time-contributor')) {
                await github.rest.issues.addLabels({
                  owner: owner,
                  repo: repo,
                  issue_number: issue.number,
                  labels: ['first-time-contributor']
                });
              }
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: `Welcome @${author}! This is your first issue in this repository. We're glad you're here!`
              });
            }

            let commentBody = '';
            if (labels.includes('bug')) {
              commentBody += 'Thank you for reporting this bug! Please review our [Bug Report Guidelines](link-to-guidelines).\n';
            }
            if (labels.includes('epic')) {
              commentBody += 'Thank you for submitting this epic feature request! Please review our [Feature Request Process](link-to-process).\n';
            }
            if (labels.includes('maintenance')) {
              commentBody += 'Thank you for reporting this maintenance task! Please review our [Maintenance Guidelines](link-to-guidelines).\n';
            }

            if (commentBody) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                body: commentBody
              });
            }

            if (labels.includes('priority-high') || labels.includes('priority-critical')) {
              const milestones = await github.rest.issues.listMilestones({
                owner: owner,
                repo: repo,
                state: 'open'
              });
              const milestone = milestones.data.find(m => m.title === 'v1.0.0');
              if (milestone) {
                await github.rest.issues.update({
                  owner: owner,
                  repo: repo,
                  issue_number: issue.number,
                  milestone: milestone.number
                });
              }
            }

            if (labels.includes('needs-triage')) {
              await github.rest.issues.removeLabel({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                name: 'needs-triage'
              });
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: issue.number,
                labels: ['needs-review']
              });
            }